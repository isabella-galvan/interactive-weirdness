<!DOCTYPE html>
<html>
<head>
  <title>Answer these questions and I'll give you a song and a picture from my Pinterest, and an answer.</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Answer these questions and  
 <br>I'll give you a song,  
<br>a picture from my Pinterest,
    <br>and an answer to a question.</h1>

  <div class="container">


────────────────────────────
    <form id="questions">
      <!-- Q1 -->
      <label>Snack Time!</label>
      <select>
        <option></option>
        <option>Crunchy Green Grapes</option>
        <option>Dirt N Worms (the dessert, duh)</option>
        <option>Scooby Doo Gummies (but only the blue ones)</option>
        <option>Tomato Soup & Goldfish</option>
      </select>

      <!-- Q2 -->
      <label>You're going on vacation. Where to?</label>
      <select>
        <option></option>
        <option>Mexico City</option>
        <option>Berlin</option>
        <option>Goa</option>
        <option>Bondi</option>
      </select>

      <!-- Q3 -->
      <label>Pick one of my childhood interests.</label>
      <select>
        <option></option>
        <option>The Titanic</option>
        <option>One Direction</option>
        <option>Ancient Egyptian Mummies</option>
        <option>1950's Musicals</option>
      </select>

      <!-- Q4 -->
      <label>Ask a yes or no question:</label>
      <input type="text" placeholder="asking the magic 8ball...">

     <button type="button" onclick="showResult()">that was scawy</button>
    </form>

    <div id="result" style="margin-top:20px;"></div>



────────────────────────────

  </div>

<script>
function showResult() {
  const selects = document.querySelectorAll('#questions select');
  const answer1 = selects[0].value;
  const answer2 = selects[1].value;
  const answer3 = selects[2].value;
  const question = document.querySelector('#questions input').value.toLowerCase();

  // trait selection
  let traits = {
    chill: 0,
    cool: 0,
    beachy: 0,
    cozy: 0
  };

  // scores

  // snack time!
  if (answer1.includes("Grapes")) traits.chill += 2;
  if (answer1.includes("Dirt")) traits.cool += 2;
  if (answer1.includes("Scooby")) traits.beachy += 2;
  if (answer1.includes("Tomato")) traits.cozy = (traits.cozy || 0) + 2;

  // vacation spot
  if (answer2 === "Berlin") traits.cool += 1;
  if (answer2 === "Mexico City") traits.chill += 2;
  if (answer2 === "Goa") traits.cozy += 2;
  if (answer2 === "Bondi") traits.beachy += 1;

  // my interest
  if (answer3.includes("Titanic")) traits.cool += 2;
  if (answer3.includes("One Direction")) traits.beachy += 2;
  if (answer3.includes("Mummies")) traits.chill += 1;
  if (answer3.includes("Musicals")) traits.cozy += 1;

  // main result
  let dominant = Object.keys(traits).reduce((a, b) =>
    traits[a] > traits[b] ? a : b
  );

  let song = "";
  let image = "";
  let message = "";

  // FINAL RESULTS!!!!

  if (dominant === "chill") {
    song = `<iframe src="https://open.spotify.com/embed/track/21ypdslAhK5dhLuHXIYIfG" width="100%" height="152"></iframe>`;
    image = "https://i.pinimg.com/1200x/b1/24/2c/b1242c191b00e825b108341ed4ab5770.jpg";
    message = "Reply hazy, try again";
  }
//------------------------------------------------------------------------------------------------------------------
  else if (dominant === "cool") {
    song = `<iframe src="https://open.spotify.com/embed/track/7uv632EkfwYhXoqf8rhYrg" width="100%" height="152"></iframe>`;
    image = "https://i.pinimg.com/1200x/6d/25/6f/6d256fb3abacc75e780c7d55a6c127e0.jpg";
    message = " Don't count on it";
  }
//------------------------------------------------------------------------------------------------------------------
  else if (dominant === "beachy") {
    song = `<iframe src="https://open.spotify.com/embed/track/5K6fJf9l8WTsscngGert0b" width="100%" height="352"></iframe>`;
    image = "https://i.pinimg.com/1200x/a9/9f/4e/a99f4e88cad4fdd3d41c6ea81cb5be28.jpg";
    message = "Without a doubt";
  }
//------------------------------------------------------------------------------------------------------------------
  else if (dominant === "cozy") {
    song = `<iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/4KROoGIaPaR1pBHPnR3bwC?utm_source=generator"
    width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
    image = "https://i.pinimg.com/736x/85/fc/60/85fc60f25d97542c03e3724928d314ac.jpg";
    message = "Signs point to yes";
  }
//------------------------------------------------------------------------------------------------------------------
  else {
    song = `<iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/0HDaKOlVAfUWXdFR2RhBtN?utm_source=generator" width="100%"
    height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
    image = "https://i.pinimg.com/736x/bd/c2/fe/bdc2fe8abc001e1748635a9ad328eb11.jpg";
    message = "My sources say no";
  }

  // get result
  document.getElementById("result").innerHTML = `
    <p><strong>your song:</strong></p>
    ${song}
    <p><strong>your image:</strong></p>
    <img src="${image}" width="100%">
    <p><strong>your answer:</strong> ${message}</p>
  `;
}
</script>
</body>
</html>
